<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Primary -->
  <title>Uruu OS - Multi-Business Management Platform</title>
  <meta name="description" content="Uruu OS - POS, inventory, pharmacy, café sessions, printing, and reporting, tailored to your business, in one workspace." />
  <meta name="theme-color" content="#070B24" />
  <meta name="color-scheme" content="dark" />

  <!-- PWA -->
  <meta name="application-name" content="Uruu OS" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Uruu OS" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Uruu OS - Multi-Business Management Platform" />
  <meta property="og:description" content="Manage sessions, printing, inventory, and revenue in one place." />
  <meta property="og:site_name" content="Uruu OS" />

  <!-- Favicon — inline SVG data-URI so no asset file is required -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />

  <!-- PWA: installable app manifest + iOS home-screen icon -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Fonts: Inter (body/UI) + Space Grotesk (display), self-hosted (see
       src/index.css @font-face) — no more external fonts.googleapis.com /
       fonts.gstatic.com round trips blocking first paint. -->
  <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
